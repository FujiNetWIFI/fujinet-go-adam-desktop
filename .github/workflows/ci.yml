# Builds the shared core and every frontend the runner's platform supports,
# then runs the test suite -- including the real boot tests, since the
# public-domain system ROMs are bundled in the repository. adamcore is
# cloned from its own repository and staged via ADAMCORE_SRC.
#
# The macOS job is the substitute for owning a Mac: it proves the core,
# the compat shims, and the AppKit frontend build and pass tests on real
# Apple hardware, and uploads a ready-to-run app bundle.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: tschak909/adamcore
          path: adamcore-src
      - name: Install toolkit dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-4-dev libadwaita-1-dev \
            libwebkitgtk-6.0-dev qt6-base-dev qt6-webengine-dev
      - name: Build and install SDL3
        run: |
          git clone --depth 1 --branch release-3.2.16 \
            https://github.com/libsdl-org/SDL.git sdl3-src
          cmake -S sdl3-src -B sdl3-src/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DSDL_TEST_LIBRARY=OFF
          cmake --build sdl3-src/build
          sudo cmake --install sdl3-src/build
      - name: Configure
        run: cmake -B build -G Ninja
        env:
          ADAMCORE_SRC: ${{ github.workspace }}/adamcore-src
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: tschak909/adamcore
          path: adamcore-src
      - uses: actions/checkout@v4
        with:
          repository: FujiNetWIFI/fujinet-firmware
          path: fujinet-src
      - name: Install dependencies
        run: brew install ninja mbedtls
      # SDL3 is linked STATICALLY on macOS so the shipped .app has no
      # Homebrew (or any non-system) library dependencies -- a bundle that
      # links /opt/homebrew paths only launches on machines that happen to
      # have Homebrew's sdl3 installed.
      - name: Build and install static SDL3
        run: |
          git clone --depth 1 --branch release-3.2.16 \
            https://github.com/libsdl-org/SDL.git sdl3-src
          cmake -S sdl3-src -B sdl3-src/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DSDL_SHARED=OFF -DSDL_STATIC=ON \
            -DSDL_TEST_LIBRARY=OFF
          cmake --build sdl3-src/build
          sudo cmake --install sdl3-src/build
      # Built BEFORE configure so the frontend's bundle rule sees the
      # dylib. This is what puts FujiNet inside the shipped Mac app.
      - name: Build FujiNet runtime (libfujinet.dylib)
        run: |
          pip3 install --break-system-packages pyyaml jinja2 \
            || pip3 install pyyaml jinja2 || true
          ./tools/fujinet/build-fujinet-desktop.sh
        env:
          FUJINET_SRC: ${{ github.workspace }}/fujinet-src
          MBEDTLS_ROOT_DIR: /opt/homebrew/opt/mbedtls
      - name: Configure
        run: cmake -B build -G Ninja
        env:
          ADAMCORE_SRC: ${{ github.workspace }}/adamcore-src
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Verify the bundle is self-contained
        run: |
          APP="build/frontends/macos/FujiNet Go Adam.app"
          leaked=0
          while IFS= read -r -d '' f; do
            if file "$f" | grep -q "Mach-O"; then
              echo "--- $f"
              otool -L "$f"
              if otool -L "$f" | tail -n +2 | grep -E "/opt/homebrew|/usr/local"; then
                leaked=1
              fi
            fi
          done < <(find "$APP" -type f -print0)
          if [ "$leaked" -ne 0 ]; then
            echo "::error::non-system library leaked into the app bundle"
            exit 1
          fi
          test -f "$APP/Contents/Frameworks/libfujinet.dylib" \
            || { echo "::error::libfujinet.dylib missing from the bundle"; exit 1; }
      # ditto preserves the executable bits and structure that a plain
      # artifact upload of a .app directory does not.
      - name: Zip app bundle
        run: |
          ditto -c -k --keepParent \
            "build/frontends/macos/FujiNet Go Adam.app" \
            FujiNet-Go-Adam-macos.zip
      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: FujiNet-Go-Adam-macos
          path: FujiNet-Go-Adam-macos.zip
